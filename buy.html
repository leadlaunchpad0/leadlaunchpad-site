<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy Leads – Lead Launchpad</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #000; color: #fff; }
    h1 { text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
    .row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .col { flex: 1; min-width: 250px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    select, button { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 2px solid #333; background: #111; color: #fff; }
    select:focus, button:focus { outline: none; border-color: #666; }
    .price-display { font-size: 28px; font-weight: bold; margin: 20px 0; text-align: center; }
    .btn-checkout { background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; }
    .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; }
    .note { color: #666; font-size: 14px; margin-top: 20px; text-align: center; }
    .error { color: #f44; margin-top: 10px; text-align: center; }
    .packages { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .pkg { border: 2px solid #fff; border-radius: 12px; padding: 15px; width: 150px; text-align: center; cursor: pointer; }
    .pkg.selected { border-color: #0f0; background: #111; }
    .pkg h4 { margin: 5px 0; font-size: 16px; }
    .pkg .qty { font-size: 14px; color: #ccc; }
    .pkg .price { font-size: 18px; font-weight: bold; margin: 8px 0; }
  </style>
</head>
<body>
  <h1>Buy Leads</h1>
  <p class="subtitle">Select country and package. Instant CSV delivery after payment.</p>

  <div class="row">
    <div class="col">
      <label for="country">Country</label>
      <select id="country">
        <option value="USA">USA</option>
        <option value="AU">Australia</option>
      </select>
    </div>
    <div class="col">
      <label>Package</label>
      <div class="packages">
        <div class="pkg" data-quantity="500" data-price="99">
          <h4>Starter</h4>
          <div class="qty">500 leads</div>
          <div class="price">$99</div>
        </div>
        <div class="pkg" data-quantity="1000" data-price="179">
          <h4>Business</h4>
          <div class="qty">1k leads</div>
          <div class="price">$179</div>
        </div>
        <div class="pkg" data-quantity="5000" data-price="349">
          <h4>Large</h4>
          <div class="qty">5k leads</div>
          <div class="price">$349</div>
        </div>
        <div class="pkg" data-quantity="20000" data-price="699">
          <h4>Enterprise</h4>
          <div class="qty">20k leads</div>
          <div class="price">$699</div>
        </div>
      </div>
    </div>
  </div>

  <div class="price-display" id="total"></div>

  <button class="btn-checkout" id="checkout" disabled>Proceed to Checkout</button>
  <div class="error" id="error"></div>

  <p class="note">
    Payment via Stripe. CSV delivered instantly to your email.
  </p>

  <script>
    const countrySelect = document.getElementById('country');
    const packages = document.querySelectorAll('.pkg');
    const checkoutBtn = document.getElementById('checkout');
    const totalEl = document.getElementById('total');
    const errorEl = document.getElementById('error');

    let selectedQuantity = null;

    // Pre-select from URL
    const urlParams = new URLSearchParams(window.location.search);
    const qty = urlParams.get('quantity');
    if (qty) {
      const pkg = document.querySelector(`.pkg[data-quantity="${qty}"]`);
      if (pkg) selectPackage(pkg);
    }

    packages.forEach(p => p.addEventListener('click', () => selectPackage(p)));

    function selectPackage(pkg) {
      packages.forEach(p => p.classList.remove('selected'));
      pkg.classList.add('selected');
      selectedQuantity = pkg.dataset.quantity;
      const price = pkg.dataset.price;
      totalEl.textContent = `$${price} USD`;
      checkoutBtn.disabled = false;
      errorEl.textContent = '';
    }

    checkoutBtn.addEventListener('click', async () => {
      const country = countrySelect.value;
      const quantity = parseInt(selectedQuantity, 10);
      const API_URL = 'https://leadlaunchpad-site.vercel.app';
      errorEl.textContent = '';
      checkoutBtn.disabled = true;
      try {
        const response = await fetch(`${API_URL}/api/create-checkout-session`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ country, quantity })
        });
        const session = await response.json();
        if (session.url) {
          window.location = session.url;
        } else {
          throw new Error(session.error || 'Failed to create checkout session');
        }
      } catch (e) {
        errorEl.textContent = 'Error: ' + e.message;
        checkoutBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
